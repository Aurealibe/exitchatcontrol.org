    <script>
      /* Language + theme boot — runs before first paint so there is no flash.
         Priority: ?lang= URL param → localStorage → browser language.
         Theme: localStorage only (otherwise CSS prefers-color-scheme rules). */
      ;(function () {
        var root = document.documentElement
        try {
          var q = new URLSearchParams(location.search).get('lang')
          /* /en/ is the English landing page: the path is the sharer's intent
             and beats stored preference (an explicit ?lang= beats both).
             NB: block comments ONLY in this inline script — the prerenderer's
             head parser chokes on line comments and eats the <script> tag. */
          var p = location.pathname.indexOf('/en') === 0 ? 'en' : null
          var s = localStorage.getItem('lang')
          var b = (navigator.language || 'en').toLowerCase()
          var l =
            q === 'fr' || q === 'en' ? q : p ? p : s === 'fr' || s === 'en' ? s : b.indexOf('fr') === 0 ? 'fr' : 'en'
          root.setAttribute('data-lang', l)
          root.setAttribute('lang', l)
          var qt = new URLSearchParams(location.search).get('theme')
          var t = qt === 'dark' || qt === 'light' ? qt : localStorage.getItem('theme')
          if (t === 'dark' || t === 'light') root.setAttribute('data-theme', t)
          var g = new URLSearchParams(location.search).get('goto')
          if (g)
            addEventListener('load', function () {
              var el = document.getElementById(g)
              if (el) el.scrollIntoView({ behavior: 'instant', block: 'start' })
            })
          /* screenshot rig: headless Chrome resets scroll before capturing, so
             ?shot=<id> shifts the page up with a margin instead of scrolling */
          var sh = new URLSearchParams(location.search).get('shot')
          if (sh)
            document.addEventListener('DOMContentLoaded', function () {
              var el = document.getElementById(sh)
              if (el) document.body.style.marginTop = -el.getBoundingClientRect().top + 'px'
            })
          if (new URLSearchParams(location.search).get('probe'))
            document.addEventListener('DOMContentLoaded', function () {
              var vw = document.documentElement.clientWidth
              var out = ['vw=' + vw, 'doc=' + document.documentElement.scrollWidth]
              document.querySelectorAll('body *').forEach(function (n) {
                var r = n.getBoundingClientRect()
                if (r.width > vw + 1 && out.length < 12)
                  out.push(n.tagName + '.' + String(n.className).split(' ')[0] + '=' + Math.round(r.width))
              })
              document.title = out.join(' | ')
            })
        } catch (e) {
          root.setAttribute('data-lang', 'fr')
          root.setAttribute('lang', 'fr')
        }
      })()
    </script>
