name: ci

# Safe by construction: no ${{ github.event.* }} interpolation anywhere in
# run: blocks (workflow-injection guidance followed).
on:
  push:
    branches: [main, 'revamp/**']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # pnpm version comes from package.json "packageManager" (action-setup
      # errors out if both it and `version:` are specified)
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - name: deep e2e battery (headless chrome — static + hydrated interactions)
        run: node scripts/e2e.mjs
