<title>404 — Devenir Ingouvernable</title>
<style>
  :root{--bg:#efece3;--text:#1b1813;--dim:#5c5749;--accent:#a9761a;--warn:#a83324;

    --serif:"Iowan Old Style",Palatino,Charter,Georgia,serif}
  @media (prefers-color-scheme:dark){:root{--bg:#111318;--text:#e6e2d6;--dim:#9a9585;--accent:#e6b23f;--warn:#e0705f}}
  body{margin:0;min-height:100dvh;display:grid;place-items:center;background:
    repeating-linear-gradient(0deg,transparent 0 3px,color-mix(in srgb,var(--text) 4%,transparent) 3px 4px),var(--bg);
    color:var(--text);font-family:var(--serif);padding:2rem;box-sizing:border-box;text-align:center}
  .stamp{display:inline-block;font-family:var(--mono);font-size:.7rem;font-weight:700;letter-spacing:.2em;
    text-transform:uppercase;color:var(--warn);border:2px solid var(--warn);border-radius:2px;
    padding:.3rem .6rem;transform:rotate(-3deg);margin-bottom:1.4rem}
  h1{font-family:var(--mono);font-size:clamp(2.4rem,9vw,4rem);text-transform:uppercase;margin:.2rem 0}
  p{color:var(--dim);max-width:44ch;margin:1rem auto}
  a{color:var(--accent)}
</style>
</head>
